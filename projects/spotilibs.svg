      .text-libs { font-family: 'Circular', 'Montserrat', 'Helvetica Neue', sans-serif; font-weight: 700; font-size: 110px; fill: #FFFFFF; letter-spacing: -2px; }
    </style>
  </defs>
  <!-- Background -->
    <rect width="800" height="300" class="bg" />
